<!DOCTYPE html>
<html>
<head>
    <title>Jeff Alerta | Resume</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            margin: 0;
            padding: 0;
        }

        header {
            padding: 50px 20px;
            max-width: 1100px;
            margin: auto;
        }

        .profile-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #3b82f6;
        }

        section {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
        }

        h2 {
            border-bottom: 2px solid #374151;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #3b82f6;
        }

        .box {
            background: #1f2937;
            padding: 25px;
            margin: 20px 0;
            border-radius: 10px;
        }

        /* ===================== */
        /* FILTER BUTTONS */
        .filters {
            text-align: center;
            margin-bottom: 30px;
        }

        .filters button {
            background: #1f2937;
            color: white;
            border: 1px solid #3b82f6;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .filters button:hover,
        .filters button.active {
            background: #3b82f6;
        }

        /* ===================== */
        /* GALLERY */
        .gallery {
            display: flex;
            gap: 15px;
            overflow: hidden;
        }

        .project {
            position: relative;
            flex: 0 0 33%;
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            transition: 0.6s ease;
        }

        .project.show {
            opacity: 1;
            transform: translateY(0);
        }

        .project img {
            width: 100%;
            border-radius: 10px;
        }

        /* HOVER OVERLAY */
        .overlay {
            position: absolute;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            width: 100%;
            padding: 10px;
            border-radius: 0 0 10px 10px;
            text-align: center;
            font-weight: bold;
            opacity: 0;
            transition: 0.3s;
        }

        .project:hover .overlay {
            opacity: 1;
        }

        /* ===================== */
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            padding-top: 100px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-box {
            background: #1f2937;
            margin: auto;
            padding: 30px;
            width: 80%;
            max-width: 600px;
            border-radius: 10px;
            text-align: center;
        }

        .close {
            position: absolute;
            top: 40px;
            right: 60px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #0f172a;
            margin-top: 40px;
            color: #9ca3af;
        }

        @media(max-width:768px){
            .gallery {
                flex-direction: column;
            }
            .project {
                flex: 100%;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="profile-container">
        <div>
            <h1>Jeff Alerta</h1>
            <p>Digital Marketing | GHL Specialist | Tech Professional</p>
        </div>
        <img src="image.jpg" alt="Profile Picture" class="profile-img">
    </div>
</header>

<section>
    <h2>SCREENSHOT OF THE PROJECTS</h2>

    <!-- FILTER BUTTONS -->
    <div class="filters">
        <button onclick="filterProjects('all')" class="active">All</button>
        <button onclick="filterProjects('ghl')">GHL</button>
        <button onclick="filterProjects('design')">Design</button>
        <button onclick="filterProjects('crm')">CRM</button>
        <button onclick="filterProjects('ads')">Ads</button>
    </div>

    <!-- PROJECTS -->
    <div class="gallery" id="gallery">

        <div class="project ghl" onclick="openModal('GHL Funnel Build','Built automation funnels with booking system.')">
            <img src="project1.jpg">
            <div class="overlay">GHL Funnel</div>
        </div>

        <div class="project design" onclick="openModal('Graphic Design','Created branding and social visuals.')">
            <img src="project2.jpg">
            <div class="overlay">Design Project</div>
        </div>

        <div class="project crm" onclick="openModal('CRM Setup','Built pipelines and automated workflows.')">
            <img src="project3.jpg">
            <div class="overlay">CRM Automation</div>
        </div>

        <div class="project ads" onclick="openModal('Facebook Ads','Lead generation campaign setup.')">
            <img src="project4.jpg">
            <div class="overlay">Ads Campaign</div>
        </div>

        <div class="project ghl" onclick="openModal('Booking Calendar','Configured calendar + reminders.')">
            <img src="project5.jpg">
            <div class="overlay">GHL Calendar</div>
        </div>

        <div class="project design" onclick="openModal('Website UI','Modern responsive web UI design.')">
            <img src="project6.jpg">
            <div class="overlay">Website Design</div>
        </div>

    </div>
</section>

<!-- MODAL -->
<div id="myModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <p id="modalDesc"></p>
    </div>
</div>

<footer>
    <p>© 2026 Jeff Alerta | All Rights Reserved</p>
</footer>

<script>

/* MODAL */
function openModal(title, desc) {
    document.getElementById("myModal").style.display = "block";
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalDesc").innerText = desc;
}

function closeModal() {
    document.getElementById("myModal").style.display = "none";
}

/* FILTER */
function filterProjects(category) {
    const projects = document.querySelectorAll('.project');
    const buttons = document.querySelectorAll('.filters button');

    buttons.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    projects.forEach(project => {
        if(category === 'all' || project.classList.contains(category)){
            project.style.display = "block";
        } else {
            project.style.display = "none";
        }
    });
}

/* AUTO SLIDER */
let scrollAmount = 0;
setInterval(() => {
    const gallery = document.getElementById('gallery');
    scrollAmount += 350;
    if(scrollAmount > gallery.scrollWidth - gallery.clientWidth){
        scrollAmount = 0;
    }
    gallery.scrollTo({
        left: scrollAmount,
        behavior: 'smooth'
    });
}, 4000);

/* ANIMATED ENTRANCE */
window.addEventListener('scroll', () => {
    const projects = document.querySelectorAll('.project');
    projects.forEach(project => {
        const rect = project.getBoundingClientRect();
        if(rect.top < window.innerHeight - 100){
            project.classList.add('show');
        }
    });
});

</script>

</body>
</html>
